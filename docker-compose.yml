services:
  postgres:
    image: postgres:16-alpine
    container_name: ropa-postgres
    environment:
      POSTGRES_DB: ropa
      POSTGRES_USER: ropa
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ropa}
    ports:
      - "55432:5432"
    volumes:
      - ropa-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ropa -d ropa"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ropa-postgres-data:
