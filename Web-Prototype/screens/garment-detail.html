<!doctype html>
<html lang="es"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="icon" href="data:,"/><title>Detalle de prenda · Armario Capsula</title><style>
:root{--bg:#FFFDF9;--surface:#FFFFFF;--fg:#1F2933;--muted:#6B6F72;--border:#E8E2DC;--accent:#FF6B5F;--sand:#F7F1EA;--teal:#009D8F;--sage:#A7C7B7;--terracotta:#E76F51;--font-display:'Playfair Display','Iowan Old Style',Georgia,serif;--font-body:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body)}button{font:inherit}.app{width:min(430px,100vw);min-height:100vh;margin:0 auto;padding:18px 16px 96px}.top{display:flex;justify-content:space-between}.icon{width:42px;height:42px;border:1px solid var(--border);border-radius:15px;background:var(--surface)}.photo{height:310px;border-radius:32px;background:linear-gradient(160deg,var(--sand),var(--surface));margin:16px 0;position:relative;overflow:hidden}.photo::before{content:'';position:absolute;left:50%;top:44px;transform:translateX(-50%);width:170px;height:210px;border-radius:34px 34px 22px 22px;background:color-mix(in oklch,var(--sand) 72%,var(--fg));border:1px solid color-mix(in oklch,var(--border) 70%,var(--fg));box-shadow:0 20px 40px color-mix(in oklch,var(--fg) 12%,transparent)}h1{font-family:var(--font-display);font-size:34px;line-height:1;margin:0}.meta{color:var(--muted);font-size:13px;margin:6px 0 16px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}.chip{border-radius:999px;padding:9px 12px;background:var(--sand);font-size:12px;font-weight:800;color:var(--fg)}.section{border:1px solid var(--border);border-radius:24px;background:var(--surface);padding:16px;margin-bottom:12px}.section h2{font-size:15px;margin:0 0 12px}.compat{display:grid;gap:10px}.bar{height:10px;border-radius:999px;background:var(--sand);overflow:hidden}.bar span{display:block;height:100%;width:86%;background:var(--teal);border-radius:999px}.matches{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.mini{height:70px;border-radius:16px;background:var(--cloth,var(--sand));border:1px solid var(--border)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.btn{border-radius:16px;padding:15px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-weight:900}.btn.primary{background:var(--accent);color:var(--surface)}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(430px,100vw);height:78px;background:color-mix(in oklch,var(--surface) 92%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(16px);display:grid;grid-template-columns:repeat(5,1fr);align-items:center;padding:7px 10px 10px}.nav a{text-decoration:none;color:var(--muted);display:grid;place-items:center;gap:3px;font-size:10px;font-weight:700}.plus{width:54px;height:54px;border-radius:50%;border:0;background:var(--accent);color:var(--surface);font-size:28px}
</style></head><body><main class="app"><section class="top" data-od-id="topbar"><button class="icon">‹</button><button class="icon">♡</button></section><section data-od-id="garment-photo"><div class="photo" aria-label="Blazer lino arena"></div><h1>Blazer lino</h1><p class="meta">Chaqueta · Arena · Primavera/verano</p><div class="chips"><span class="chip">Lino</span><span class="chip">Oficina</span><span class="chip">Casual chic</span><span class="chip">Neutro</span></div></section><section class="section" data-od-id="compatibility"><h2>Compatibilidad</h2><div class="compat"><strong>86% combina con tu armario</strong><div class="bar"><span></span></div><p class="meta">Funciona especialmente bien con denim, tops blancos, terracota y accesorios arena.</p></div></section><section class="section" data-od-id="matching-items"><h2>Prendas con las que combina</h2><div class="matches"><div class="mini" style="--cloth:var(--surface)"></div><div class="mini" style="--cloth:color-mix(in oklch,var(--teal) 28%,var(--surface))"></div><div class="mini" style="--cloth:var(--terracotta)"></div><div class="mini" style="--cloth:var(--sage)"></div></div></section><div class="actions"><button class="btn">Editar prenda</button><button class="btn primary">Ver looks</button></div></main><nav class="nav" data-od-id="bottom-nav"><a href="wardrobe.html"><span>⌂</span>Tu armario</a><a href="inspiration.html"><span>✧</span>Inspiracion</a><a href="garment-detail.html"><button class="plus">+</button></a><a href="weekly-plan.html"><span>▦</span>Plan semanal</a><a href="profile-stats.html"><span>♙</span>Perfil</a></nav><script>document.querySelector('.btn.primary').addEventListener('click',()=>document.querySelector('.btn.primary').textContent='12 looks encontrados');</script></body></html>
