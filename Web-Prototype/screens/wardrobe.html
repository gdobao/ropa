<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>Prendas · Armario Capsula</title>
  <style>
    :root { --bg:#FFFDF9; --surface:#FFFFFF; --fg:#1F2933; --muted:#6B6F72; --border:#E8E2DC; --accent:#FF6B5F; --sand:#F7F1EA; --teal:#009D8F; --sage:#A7C7B7; --terracotta:#E76F51; --font-display:'Playfair Display','Iowan Old Style',Georgia,serif; --font-body:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body)} h1,h2,h3{font-family:var(--font-display)} button{font:inherit}.app{width:min(430px,100vw);min-height:100vh;margin:0 auto;padding:18px 16px 96px;background:var(--bg)}.top{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;margin-bottom:16px}.top h1{font-size:22px;text-align:center;margin:0}.icon{width:42px;height:42px;border:1px solid var(--border);border-radius:15px;background:var(--surface);display:grid;place-items:center}.filters{display:flex;gap:9px;overflow:auto;padding-bottom:8px}.chip{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:9px 13px;font-size:12px;font-weight:700;white-space:nowrap}.chip.active{background:var(--teal);color:var(--surface);border-color:var(--teal)}.category-row{display:flex;gap:11px;overflow:auto;margin:12px 0 14px}.cat{min-width:52px;text-align:center;color:var(--muted);font-size:10px}.cat span{width:48px;height:44px;border-radius:16px;background:var(--sand);display:grid;place-items:center;margin-bottom:5px;color:var(--accent)}.count{display:flex;justify-content:space-between;align-items:center;margin:4px 2px 12px}.count strong{font-size:14px}.count button{border:0;background:transparent;color:var(--muted);font-size:12px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.card{border:1px solid var(--border);border-radius:22px;background:var(--surface);padding:10px;position:relative}.fav{position:absolute;right:10px;top:10px;width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:color-mix(in oklch,var(--surface) 86%,transparent);color:var(--accent)}.photo{height:124px;border-radius:18px;background:linear-gradient(160deg,color-mix(in oklch,var(--sand) 88%,var(--surface)),var(--surface));position:relative;overflow:hidden}.photo::before{content:'';position:absolute;left:50%;top:20px;transform:translateX(-50%);width:66px;height:84px;border-radius:18px 18px 12px 12px;background:var(--cloth,var(--sand));border:1px solid color-mix(in oklch,var(--border) 82%,var(--fg))}.photo.pants::before{width:52px;height:92px;border-radius:12px;background:linear-gradient(90deg,var(--cloth) 0 45%,color-mix(in oklch,var(--cloth) 74%,var(--fg)) 46% 54%,var(--cloth) 55%)}.card h2{font-size:12px;margin:9px 0 2px}.card p{margin:0;color:var(--muted);font-size:10px}.floating{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);border:0;border-radius:999px;background:var(--teal);color:var(--surface);padding:14px 22px;font-weight:800;box-shadow:0 16px 28px color-mix(in oklch,var(--teal) 28%,transparent)}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(430px,100vw);height:78px;background:color-mix(in oklch,var(--surface) 92%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(16px);display:grid;grid-template-columns:repeat(5,1fr);align-items:center;padding:7px 10px 10px}.nav a{text-decoration:none;color:var(--muted);display:grid;place-items:center;gap:3px;font-size:10px;font-weight:700}.nav a.active{color:var(--accent)}.plus{width:54px;height:54px;border-radius:50%;border:0;background:var(--accent);color:var(--surface);font-size:28px}
  </style>
</head>
<body>
  <main class="app">
    <section class="top" data-od-id="topbar"><button class="icon">‹</button><h1>Prendas</h1><button class="icon">⌕</button></section>
    <section data-od-id="filters"><div class="filters"><button class="chip active" data-filter="all">Categoria</button><button class="chip" data-filter="work">Ocasion</button><button class="chip" data-filter="neutral">Color</button><button class="chip" data-filter="summer">Temporada</button></div><div class="category-row"><div class="cat"><span>⌂</span>Todos</div><div class="cat"><span>⌁</span>Tops</div><div class="cat"><span>▥</span>Pantalones</div><div class="cat"><span>♢</span>Vestidos</div><div class="cat"><span>▱</span>Chaquetas</div><div class="cat"><span>⌒</span>Zapatos</div></div></section>
    <section data-od-id="wardrobe-grid"><div class="count"><strong>128 prendas</strong><button>Ordenar⌄</button></div><div class="grid">
      <article class="card"><button class="fav">♥</button><div class="photo" style="--cloth:color-mix(in oklch,var(--sand) 78%,var(--terracotta))"></div><h2>Blusa satinada</h2><p>Beige</p></article>
      <article class="card"><button class="fav">♡</button><div class="photo pants" style="--cloth:color-mix(in oklch,var(--teal) 38%,var(--surface))"></div><h2>Jeans rectos</h2><p>Azul medio</p></article>
      <article class="card"><button class="fav">♡</button><div class="photo" style="--cloth:color-mix(in oklch,var(--sand) 85%,var(--fg))"></div><h2>Blazer lino</h2><p>Arena</p></article>
      <article class="card"><button class="fav">♥</button><div class="photo" style="--cloth:color-mix(in oklch,var(--sage) 68%,var(--sand))"></div><h2>Vestido midi</h2><p>Verde salvia</p></article>
      <article class="card"><button class="fav">♡</button><div class="photo" style="--cloth:color-mix(in oklch,var(--terracotta) 82%,var(--fg))"></div><h2>Sueter ligero</h2><p>Terracota</p></article>
      <article class="card"><button class="fav">♡</button><div class="photo pants" style="--cloth:color-mix(in oklch,var(--fg) 82%,var(--surface))"></div><h2>Pantalon sastre</h2><p>Negro</p></article>
    </div></section>
  </main>
  <button class="floating">Filtros activos (2)</button>
  <nav class="nav" data-od-id="bottom-nav"><a class="active" href="wardrobe.html"><span>⌂</span>Tu armario</a><a href="inspiration.html"><span>✧</span>Inspiracion</a><a href="garment-detail.html"><button class="plus">+</button></a><a href="weekly-plan.html"><span>▦</span>Plan semanal</a><a href="profile-stats.html"><span>♙</span>Perfil</a></nav>
  <script>document.querySelectorAll('.chip').forEach(chip=>chip.addEventListener('click',()=>{document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');document.querySelector('.floating').textContent='Filtro: '+chip.textContent;}));document.querySelectorAll('.fav').forEach(btn=>btn.addEventListener('click',()=>btn.textContent=btn.textContent==='♥'?'♡':'♥'));</script>
</body>
</html>
