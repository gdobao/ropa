<!doctype html>
<html lang="es"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="icon" href="data:,"/><title>Inspiracion · Armario Capsula</title><style>
:root{--bg:#FFFDF9;--surface:#FFFFFF;--fg:#1F2933;--muted:#6B6F72;--border:#E8E2DC;--accent:#FF6B5F;--sand:#F7F1EA;--teal:#009D8F;--sage:#A7C7B7;--terracotta:#E76F51;--font-display:'Playfair Display','Iowan Old Style',Georgia,serif;--font-body:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body)}button,input{font:inherit}.app{width:min(430px,100vw);min-height:100vh;margin:0 auto;padding:18px 16px 96px}h1{font-family:var(--font-display);font-size:34px;line-height:1;margin:10px 0 6px}.lead{color:var(--muted);font-size:13px;margin:0 0 16px}.search{display:flex;align-items:center;gap:10px;border:1px solid var(--border);background:var(--surface);border-radius:18px;padding:12px 14px}.search input{border:0;outline:0;background:transparent;flex:1;color:var(--fg)}.chips{display:flex;gap:9px;overflow:auto;margin:14px 0 16px}.chip{border:1px solid var(--border);border-radius:999px;background:var(--surface);padding:9px 13px;font-weight:800;font-size:12px}.chip.active{background:var(--teal);color:var(--surface);border-color:var(--teal)}.masonry{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.look{border-radius:24px;background:var(--surface);border:1px solid var(--border);overflow:hidden}.visual{height:170px;background:linear-gradient(160deg,var(--sand),var(--surface));position:relative}.look:nth-child(2) .visual{height:218px}.look:nth-child(3) .visual{height:210px}.visual i{position:absolute;border-radius:14px;border:1px solid color-mix(in oklch,var(--border) 76%,var(--fg));background:var(--cloth)}.visual i:nth-child(1){width:50px;height:74px;left:24px;top:28px}.visual i:nth-child(2){width:44px;height:96px;right:24px;top:52px}.visual i:nth-child(3){width:54px;height:38px;left:46px;bottom:18px}.body{padding:12px}.body h2{font-size:13px;margin:0}.body p{font-size:11px;color:var(--muted);margin:4px 0 0}.heart{position:absolute;right:10px;top:10px;width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:color-mix(in oklch,var(--surface) 86%,transparent);color:var(--accent)}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(430px,100vw);height:78px;background:color-mix(in oklch,var(--surface) 92%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(16px);display:grid;grid-template-columns:repeat(5,1fr);align-items:center;padding:7px 10px 10px}.nav a{text-decoration:none;color:var(--muted);display:grid;place-items:center;gap:3px;font-size:10px;font-weight:700}.nav a.active{color:var(--accent)}.plus{width:54px;height:54px;border-radius:50%;border:0;background:var(--accent);color:var(--surface);font-size:28px}
</style></head><body><main class="app"><section data-od-id="inspiration-hero"><h1>Inspiracion</h1><p class="lead">Ideas que puedes recrear con prendas de tu armario.</p><label class="search">⌕<input placeholder="Buscar oficina, cena, verano..."/></label><div class="chips"><button class="chip active">Minimal</button><button class="chip">Oficina</button><button class="chip">Cena</button><button class="chip">Verano</button><button class="chip">Invierno</button></div></section><section class="masonry" data-od-id="look-gallery"><article class="look"><div class="visual"><button class="heart">♡</button><i style="--cloth:var(--sand)"></i><i style="--cloth:color-mix(in oklch,var(--teal) 26%,var(--surface))"></i><i style="--cloth:var(--terracotta)"></i></div><div class="body"><h2>Capsula oficina</h2><p>6 piezas compatibles</p></div></article><article class="look"><div class="visual"><button class="heart">♡</button><i style="--cloth:var(--sage)"></i><i style="--cloth:var(--surface)"></i><i style="--cloth:var(--accent)"></i></div><div class="body"><h2>Domingo ligero</h2><p>Look fresco con salvia</p></div></article><article class="look"><div class="visual"><button class="heart">♡</button><i style="--cloth:var(--fg)"></i><i style="--cloth:var(--sand)"></i><i style="--cloth:var(--teal)"></i></div><div class="body"><h2>Negro + arena</h2><p>Base neutra elevada</p></div></article><article class="look"><div class="visual"><button class="heart">♡</button><i style="--cloth:var(--terracotta)"></i><i style="--cloth:var(--sand)"></i><i style="--cloth:color-mix(in oklch,var(--sage) 64%,var(--surface))"></i></div><div class="body"><h2>Cena casual</h2><p>Textura calida</p></div></article></section></main><nav class="nav" data-od-id="bottom-nav"><a href="wardrobe.html"><span>⌂</span>Tu armario</a><a class="active" href="inspiration.html"><span>✧</span>Inspiracion</a><a href="garment-detail.html"><button class="plus">+</button></a><a href="weekly-plan.html"><span>▦</span>Plan semanal</a><a href
