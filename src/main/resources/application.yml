spring:
  application:
    name: ropa
  datasource:
    url: jdbc:postgresql://localhost:55432/ropa
    username: ropa
    password: ${DB_PASSWORD:ropa}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB
  flyway:
    enabled: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=24h
  security:
    filter:
      dispatcher-types: request, forward, error

server:
  port: 8080

app:
  ai:
    enabled: true
    base-url: https://api.nan.builders
    chat-path: /v1/chat/completions
    model: qwen3.6
    api-key: ${NAN_API_KEY:}
    max-tokens: 500
    connect-timeout: 5s
    read-timeout: 20s
  upload:
    directory: uploads
    max-size: 8MB
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
  wardrobe:
    categories: Top, Pantalón, Vestido, Falda, Chaqueta, Abrigo, Camisa, Sudadera, Zapatos, Accesorio, Otro
    days: Lunes, Martes, Miercoles, Jueves, Viernes, Sabado, Domingo
    color-limit: 5
  rate-limit:
    analyze:
      capacity: 10
      refill-minutes: 60
    recommendation:
      capacity: 5
      refill-minutes: 30
