spring:
  application:
    name: ropa
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
  datasource:
    url: jdbc:postgresql://localhost:55432/ropa
    username: ropa
    password: ${DB_PASSWORD:ropa}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=24h
  security:
    filter:
      dispatcher-types: request, forward, error

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true

app:
  admin:
    token: ${ADMIN_TOKEN:}
  ai:
    enabled: ${APP_AI_ENABLED:true}
    base-url: https://api.nan.builders
    chat-path: /v1/chat/completions
    model: qwen3.6
    api-key: ${NAN_API_KEY:${APP_AI_API_KEY:}}
    max-tokens: 2000
    connect-timeout: 5s
    read-timeout: 60s
    models:
      - id: gemma4
        name: Gemma 4
        provider: google
        default: false
      - id: qwen3.6
        name: Qwen 3.6
        provider: alibaba
        default: true
      - id: deepseek-v4-flash
        name: DeepSeek V4 Flash
        provider: deepseek
        default: false
  upload:
    directory: uploads
    max-size: 8MB
    max-width: 6000
    max-height: 6000
    max-pixels: 24000000
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
  wardrobe:
    categories: Top, Pantalón, Vestido, Falda, Chaqueta, Abrigo, Camisa, Sudadera, Zapatos, Accesorio, Otro
    days: Lunes, Martes, Miercoles, Jueves, Viernes, Sabado, Domingo
    color-limit: 5
  rate-limit:
    analyze:
      capacity: 10
      refill-minutes: 60
    recommendation:
      capacity: 5
      refill-minutes: 30
    chat:
      capacity: 30
      refill-minutes: 1
    chat-per-owner:
      capacity: 10
      refill-minutes: 1
  chat:
    retention:
      analytics-events-days: 90
      session-inactive-days: 180
      orphan-upload-cleanup: false
  colorimetry:
    delta-e-weight: 0.40
    season-weight: 0.30
    rule-weight: 0.30
    delta-e-sigmoid-midpoint: 6.5
    delta-e-sigmoid-steepness: 0.35
    neutral-delta-threshold: 15.0
    intensity-threshold: 0.30
    warm-cool-threshold: 5.0
