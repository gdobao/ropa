<!doctype html>
<html lang="es" th:replace="~{layout :: layout(content=~{::main}, title='Plan semanal', activeNav='weekly', backUrl='/dashboard', topTitle='Plan semanal', actionUrl='', actionIcon='')}" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
  <section>
    <p class="meta">Arrastra prendas entre días o usa el formulario para planificar tu semana.</p>

    <form class="weekly-assign-form" id="weekly-assign-form" th:if="${allGarments != null and !#lists.isEmpty(allGarments)}" hx-boost="false">
      <label>
        <span>Prenda</span>
        <select name="garmentId" required>
          <option value="">Selecciona una prenda</option>
          <option th:each="garment : ${allGarments}" th:value="${garment.id}" th:text="${garment.name}">Blusa</option>
        </select>
      </label>
      <label>
        <span>Día</span>
        <select name="dayOfWeek" required>
          <option value="">Selecciona un día</option>
          <option th:each="day : ${days}" th:value="${day}" th:text="${day == 'Miercoles' ? 'Miércoles' : (day == 'Sabado' ? 'Sábado' : day)}">Lunes</option>
        </select>
      </label>
      <button class="btn primary" type="submit">Asignar al plan</button>
      <p class="form-status sr-only" id="weekly-form-status" aria-live="polite"></p>
    </form>

    <div class="week-grid">
      <div class="day-col" th:each="day : ${days}" th:with="displayDay=${day == 'Miercoles' ? 'Miércoles' : (day == 'Sabado' ? 'Sábado' : day)}">
        <h3 th:text="${displayDay}" class="day-title">Lunes</h3>
        <div class="day-dropzone" th:attr="data-day=${day}">
          <div class="day-empty" th:if="${plans == null or plans.get(day) == null or #lists.isEmpty(plans.get(day))}">
            <p class="meta">Sin prendas</p>
          </div>
          <div class="day-item" th:each="plan : ${plans != null and plans.get(day) != null ? plans.get(day) : {}}"
               th:attr="data-garment-id=${plan.garmentId}"
               th:data-plan-id="${plan.planId}"
               tabindex="-1">
            <img class="day-item-thumb" th:src="${plan.imageUrl}" th:alt="${plan.garmentName}" loading="lazy" decoding="async">
            <span th:text="${plan.garmentName}">Blusa</span>
            <div class="day-item-actions">
              <button type="button" class="day-item-action" data-weekly-move="up" th:attr="aria-label=|Mover ${plan.garmentName} hacia arriba en ${displayDay}|">↑</button>
              <button type="button" class="day-item-action" data-weekly-move="down" th:attr="aria-label=|Mover ${plan.garmentName} hacia abajo en ${displayDay}|">↓</button>
              <button class="day-item-remove"
                      th:attr="hx-delete=@{/weekly-plan/{id}(id=${plan.planId})}, aria-label=|Quitar ${plan.garmentName} de ${displayDay}|"
                      hx-target="closest .day-item"
                      hx-swap="delete swap:0.2s"
                      hx-disabled-elt="this">✕</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <h2>Tus prendas</h2>
    <p class="meta">Arrastra una prenda a un día para planificar tu semana.</p>
    <div class="garment-pool" id="garment-pool">
      <div class="day-item" th:each="garment : ${allGarments}"
           th:attr="data-garment-id=${garment.id}">
        <img class="day-item-thumb" th:src="${garment.imageUrl}" th:alt="${garment.name}" loading="lazy" decoding="async">
        <span th:text="${garment.name}">Blusa</span>
      </div>
    </div>
    <div class="empty" th:if="${allGarments == null or #lists.isEmpty(allGarments)}">
      <p class="empty-emoji">👔</p>
      <h3>Sin prendas</h3>
      <p class="meta">Sube prendas primero para armar tu plan semanal.</p>
    </div>
  </section>

  <script src="https://unpkg.com/sortablejs@1.15.6/Sortable.min.js" integrity="sha384-HZZ/fukV+9G8gwTNjN7zQDG0Sp7MsZy5DDN6VfY3Be7V9dvQpEpR2jF2HlyFUUjU" crossorigin="anonymous" defer></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    function csrfHeaders() {
      var token = document.querySelector('meta[name="_csrf"]')?.content;
      var header = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';
      var headers = { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' };
      if (token) headers[header] = token;
      return headers;
    }

    function encode(values) {
      var body = new URLSearchParams();
      Object.keys(values).forEach(function(key) {
        var value = values[key];
        if (Array.isArray(value)) {
          value.forEach(function(item) { body.append(key, item); });
          return;
        }
        body.append(key, value);
      });
      return body.toString();
    }

    function request(method, url, values) {
      return window.fetch(url, {
        method: method,
        headers: csrfHeaders(),
        body: encode(values || {})
      }).then(function(response) {
        if (!response.ok) throw new Error('weekly-plan-request-failed');
        return response;
      });
    }

    function orderFor(dropzone) {
      return Array.from(dropzone.querySelectorAll('[data-plan-id]'))
        .map(function(item) { return item.dataset.planId; })
        .filter(Boolean);
    }

    function updateMoveButtons(dropzone) {
      var items = Array.from(dropzone.querySelectorAll('[data-plan-id]'));
      items.forEach(function(item, index) {
        var up = item.querySelector('[data-weekly-move="up"]');
        var down = item.querySelector('[data-weekly-move="down"]');
        if (up) up.disabled = index === 0;
        if (down) down.disabled = index === items.length - 1;
      });
    }

    function reorder(dropzone) {
      var dayOfWeek = dropzone.dataset.day;
      var order = orderFor(dropzone);
      if (!dayOfWeek || order.length === 0) return Promise.resolve();
      updateMoveButtons(dropzone);
      return request('PUT', '/weekly-plan/reorder', { dayOfWeek: dayOfWeek, order: order });
    }

    document.querySelectorAll('.day-dropzone').forEach(updateMoveButtons);

    var form = document.getElementById('weekly-assign-form');
    if (form) {
      form.addEventListener('submit', function(event) {
        event.preventDefault();
        var status = document.getElementById('weekly-form-status');
        var data = new FormData(form);
        var garmentId = data.get('garmentId');
        var dayOfWeek = data.get('dayOfWeek');
        if (!garmentId || !dayOfWeek) return;
        var button = form.querySelector('button[type="submit"]');
        if (button) button.disabled = true;
        if (status) status.textContent = 'Asignando prenda al plan.';
        request('POST', '/weekly-plan/assign', { garmentId: garmentId, dayOfWeek: dayOfWeek, position: 999 })
          .then(function() { window.location.reload(); })
          .catch(function() {
            if (status) status.textContent = 'No se pudo asignar la prenda.';
            if (button) button.disabled = false;
          });
      });
    }

    document.addEventListener('click', function(event) {
      var move = event.target.closest('[data-weekly-move]');
      if (!move) return;
      var item = move.closest('[data-plan-id]');
      var dropzone = move.closest('.day-dropzone');
      if (!item || !dropzone) return;

      if (move.dataset.weeklyMove === 'up') {
        var previous = item.previousElementSibling;
        while (previous && !previous.matches('[data-plan-id]')) previous = previous.previousElementSibling;
        if (previous) dropzone.insertBefore(item, previous);
      }

      if (move.dataset.weeklyMove === 'down') {
        var next = item.nextElementSibling;
        while (next && !next.matches('[data-plan-id]')) next = next.nextElementSibling;
        if (next) dropzone.insertBefore(next, item);
      }

      reorder(dropzone).catch(function() { window.location.reload(); });
      item.focus({ preventScroll: true });
    });

    // Day dropzones — receive garments
    document.querySelectorAll('.day-dropzone').forEach(function(el) {
      new Sortable(el, {
        group: { name: 'weekly-plan', put: true },
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        dragClass: 'sortable-drag',
        onEnd: function(evt) {
          var sameDayReorder = evt.from === evt.to;
          var dayOfWeek = evt.to.dataset.day;
          if (!dayOfWeek) return;

          if (sameDayReorder) {
            var order = Array.from(evt.to.querySelectorAll('[data-plan-id]'))
              .map(function(item) { return item.dataset.planId; })
              .filter(Boolean);

            request('PUT', '/weekly-plan/reorder', { dayOfWeek: dayOfWeek, order: order })
              .catch(function() { window.location.reload(); });
            return;
          }

          var garmentId = evt.item.dataset.garmentId;
          var newPosition = evt.newIndex;
          if (!garmentId) return;

          request('POST', '/weekly-plan/assign', { garmentId: garmentId, dayOfWeek: dayOfWeek, position: newPosition })
            .then(function() { window.location.reload(); })
            .catch(function() { window.location.reload(); });
        }
      });
    });

    // Garment pool — clone source, only pull (don't receive)
    var pool = document.getElementById('garment-pool');
    if (pool) {
      new Sortable(pool, {
        group: { name: 'weekly-plan', pull: 'clone', put: false },
        animation: 150,
        sort: false,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        dragClass: 'sortable-drag'
      });
    }
  });
  </script>
</main>
</body>
</html>
