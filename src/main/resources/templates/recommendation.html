<!doctype html>
<html lang="es" th:replace="~{layout :: layout(content=~{::main}, title='Sugerencias', activeNav='recommendation', backUrl='/dashboard', topTitle='Sugerencias', actionUrl='', actionIcon='')}" xmlns:th="http://www.thymeleaf.org">
<body>
<main>

  <section class="section rec-empty" th:if="${recommendations == null or #lists.isEmpty(recommendations)}">
    <div class="empty">
      <span class="big-num">IA</span>
      <h2>Todavía no hay sugerencias</h2>
      <p>Añade más prendas con categoría y color para que podamos preparar looks para ti.</p>
      <a class="btn primary" th:href="@{/wardrobe/new}">Añadir prendas</a>
    </div>
  </section>

  <th:block th:if="${recommendations != null and !#lists.isEmpty(recommendations)}">
    <section class="section rec-section">
      <h2>Looks sugeridos</h2>
      <p class="meta">Basados en las prendas de tu guardarropa</p>

      <div class="rec-grid">
        <article class="rec-card" th:each="rec, stat : ${recommendations}" th:style="'--i:' + ${stat.index}">
          <div class="rec-score">
            ★ <span th:text="${rec.score}">8</span><span class="rec-score-max">/10</span>
          </div>

          <div class="rec-palette" th:if="${rec.pieces != null and !#lists.isEmpty(rec.pieces)}">
            <div class="rec-palette-bar" th:each="piece : ${rec.pieces}"
                 th:style="'background:' + ${piece.colorHex}"
                 th:classappend="${piece.lightText} ? 'palette-light' : 'palette-dark'"
                 th:title="${piece.category} + ': ' + ${piece.colorName}">
              <span class="palette-cat" th:text="${piece.category}">Camisa</span>
              <span class="palette-season" th:if="${piece.colorSeason != null}" th:text="${piece.colorSeason}">Verano</span>
            </div>
          </div>

          <div class="rec-card-body">
            <h3 class="rec-name" th:text="${rec.name}">Elegancia Urbana</h3>
            <p class="rec-desc" th:text="${rec.description}">Descripción del look</p>
          </div>

          <ul class="rec-pieces" th:if="${rec.pieces != null and !#lists.isEmpty(rec.pieces)}">
            <li class="rec-pieces-item" th:each="piece : ${rec.pieces}">
              <span class="rec-pieces-dot" th:style="'background:' + ${piece.colorHex}"
                    th:classappend="${piece.lightText} ? 'dot-light' : 'dot-dark'"></span>
              <span class="rec-pieces-cat" th:text="${piece.category}">Top</span>
              <span class="rec-pieces-color" th:text="${piece.colorName}">Blanco</span>
            </li>
          </ul>
        </article>
      </div>
    </section>
  </th:block>

</main>
</body>
</html>
