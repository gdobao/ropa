<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<aside th:fragment="sidebar(activeNav)" class="sidebar">
  <a class="sidebar-brand" th:href="@{/dashboard}">
    <span class="sidebar-logo">A</span>
    <span class="sidebar-label">Armario<br>Cápsula</span>
  </a>
  <nav class="sidebar-nav">
    <a th:href="@{/dashboard}" th:classappend="${activeNav == 'dashboard'} ? 'active'" th:attr="aria-current=${activeNav == 'dashboard'} ? 'page' : null">
      <span class="sidebar-icon" aria-hidden="true"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1Z"/></svg></span>
      <span>Inicio</span>
    </a>
    <a th:href="@{/wardrobe}" th:classappend="${activeNav == 'wardrobe'} ? 'active'" th:attr="aria-current=${activeNav == 'wardrobe'} ? 'page' : null">
      <span class="sidebar-icon" aria-hidden="true"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M8 4h8l3 4-2 2v10H7V10L5 8Z"/></svg></span>
      <span>Prendas</span>
    </a>
    <a th:href="@{/wardrobe/new}" th:classappend="${activeNav == 'add'} ? 'active'" th:attr="aria-current=${activeNav == 'add'} ? 'page' : null">
      <span class="sidebar-icon" aria-hidden="true"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></span>
      <span>Añadir</span>
    </a>
    <a th:href="@{/inspiration}" th:classappend="${activeNav == 'inspiration'} ? 'active'" th:attr="aria-current=${activeNav == 'inspiration'} ? 'page' : null">
      <span class="sidebar-icon" aria-hidden="true"><svg class="nav-icon" viewBox="0 0 24 24"><path d="m12 3 2.1 5.9L20 11l-5.9 2.1L12 19l-2.1-5.9L4 11l5.9-2.1Z"/></svg></span>
      <span>Inspiración</span>
    </a>
    <a th:href="@{/recommendation}" th:classappend="${activeNav == 'recommendation'} ? 'active'" th:attr="aria-current=${activeNav == 'recommendation'} ? 'page' : null">
      <span class="sidebar-icon" aria-hidden="true"><svg class="nav-icon" viewBox="0 0 24 24"><path d="m12 2 1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6Z"/></svg></span>
      <span>Sugerencias</span>
    </a>
    <a th:href="@{/chat}" th:classappend="${activeNav == 'chat'} ? 'active'" th:attr="aria-current=${activeNav == 'chat'} ? 'page' : null">
      <span class="sidebar-icon" aria-hidden="true"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M5 5h14v10H9l-4 4Z"/></svg></span>
      <span>Chat</span>
    </a>
    <a th:href="@{/weekly-plan}" th:classappend="${activeNav == 'weekly'} ? 'active'" th:attr="aria-current=${activeNav == 'weekly'} ? 'page' : null">
      <span class="sidebar-icon" aria-hidden="true"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M5 4h14v16H5Zm4 0v16M15 4v16M5 10h14M5 16h14" fill="none" stroke="currentColor" stroke-width="1.8"/></svg></span>
      <span>Plan semanal</span>
    </a>
    <a th:href="@{/profile}" th:classappend="${activeNav == 'profile'} ? 'active'" th:attr="aria-current=${activeNav == 'profile'} ? 'page' : null">
      <span class="sidebar-icon" aria-hidden="true"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0Z"/></svg></span>
      <span>Perfil</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <span class="chip">Single-user</span>
  </div>
</aside>
</html>
