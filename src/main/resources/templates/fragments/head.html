<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title} + ' · Armario Capsula'">Armario Capsula</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!--
    PR 1 (Foundation) — extended the Google Fonts request to also load the
    three editorial families declared in `docs/REDESIGN_PLAN.md` §2.1
    (Instrument Serif 400/400i, Fraunces 700/700i, Inter variable). The
    existing Playfair Display + Poppins families are kept so the rendered
    look in PR 1 stays IDENTICAL to `main` — the migration to the editorial
    families happens in PR 3+. All three new families have no callers yet;
    they are simply pre-loaded so PR 2+ can start consuming them without an
    extra round-trip to Google Fonts.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Poppins:wght@400;500;700;800;900&family=Instrument+Serif:ital@0;1&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <link rel="stylesheet" th:href="@{/css/companion/companion-base.css}">
  <link rel="stylesheet" th:href="@{/css/companion/skins/companion-default.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous" defer></script>
  <script th:src="@{/js/companion/companion-state.js}" defer></script>
  <script th:src="@{/js/companion/companion-api.js}" defer></script>
  <script th:src="@{/js/companion/companion-dom.js}" defer></script>
  <script th:src="@{/js/companion/companion-positioning.js}" defer></script>
  <script th:src="@{/js/companion/companion-controller.js}" defer></script>
  <meta name="_csrf" th:content="${_csrf.token}" th:if="${_csrf != null}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}" th:if="${_csrf != null}"/>
  <script>
    document.addEventListener("htmx:configRequest", function(e) {
        var token = document.querySelector('meta[name="_csrf"]')?.content;
        var header = document.querySelector('meta[name="_csrf_header"]')?.content;
        if (token && header) e.detail.headers[header] = token;
    });

    document.addEventListener("htmx:responseError", function(e) {
        if (e.detail.xhr.status === 429) {
            var toast = document.getElementById("rate-limit-toast");
            if (!toast) {
                var div = document.createElement("div");
                div.id = "rate-limit-toast";
                div.className = "notice error";
                div.style.cssText = "position:fixed;top:var(--space-md);left:50%;transform:translateX(-50%);z-index:9999;max-width:400px;text-align:center;";
                div.innerHTML = "<p><strong>Demasiadas solicitudes</strong></p><p style='font-size:.875rem;'>Esper\u00E1 unos minutos antes de intentar de nuevo.</p><a href='/wardrobe' class='btn' style='margin-top:var(--space-sm);'>Volver al armario</a>";
                document.body.insertBefore(div, document.body.firstChild);
            }
            setTimeout(function() {
                var t = document.getElementById("rate-limit-toast");
                if (t) t.remove();
            }, 8000);
        }
    });
  </script>
</head>
</html>
