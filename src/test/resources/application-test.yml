spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

app:
  admin:
    token: test-admin-token
  rate-limit:
    analyze:
      capacity: 1000
      refill-minutes: 1
    recommendation:
      capacity: 1000
      refill-minutes: 1
